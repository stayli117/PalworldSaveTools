name: Setup Build Environment
description: >
  Shared bootstrap for all PST GitHub Actions workflows. Checks out the repo
  (with submodules), pins Python 3.12, enables the uv cache (keyed on
  requirements.txt), and extracts app metadata from src/common.py into
  reusable outputs. Eliminates ~9x copy-pasted setup blocks across workflows.

inputs:
  python-version:
    description: Python version to set up
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv (cached)
      uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true
        cache-dependency-glob: "requirements.txt"
      continue-on-error: true

    - name: Extract app info
      id: app_info
      shell: bash
      run: |
        APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
        APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
        GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
        {
          echo "app_name=$APP_NAME"
          echo "version=$APP_VERSION"
          echo "game_version=$GAME_VERSION"
        } >> "$GITHUB_OUTPUT"

outputs:
  app_name:
    description: Application name from src/common.py
    value: ${{ steps.app_info.outputs.app_name }}
  version:
    description: APP_VERSION from src/common.py
    value: ${{ steps.app_info.outputs.version }}
  game_version:
    description: GAME_VERSION from src/common.py
    value: ${{ steps.app_info.outputs.game_version }}
