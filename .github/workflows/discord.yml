name: Discord Release Notification

# Fires when a GitHub release is published, OR on demand for testing.
# Sends a rich embed to Discord with links to GitHub, Nexus Mods, and Discord.
#
# Mock / dry-run behavior:
#   - Real 'release: published' events ALWAYS send.
#   - Manual 'workflow_dispatch' runs default to dry_run=true, which renders the
#     full payload and prints it WITHOUT sending. Set dry_run=false to actually
#     post the mock message to Discord.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mock_version:
        description: "Mock version tag for testing (e.g., v0.0.0)"
        required: false
        default: "v0.0.0"
      dry_run:
        description: "Dry run (render payload without sending)"
        required: false
        default: true
        type: boolean

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Bootstrap environment
        id: env
        uses: ./.github/actions/setup-build-env
      - name: Resolve release metadata
        id: meta
        env:
          MOCK_VERSION: ${{ github.event.inputs.mock_version }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            echo "title=${RELEASE_NAME:-${RELEASE_TAG}}" >> "$GITHUB_OUTPUT"
            echo "url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
            echo "is_mock=false" >> "$GITHUB_OUTPUT"
            # Real releases always send.
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${MOCK_VERSION}" >> "$GITHUB_OUTPUT"
            echo "title=[MOCK-UP] ${{ steps.env.outputs.app_name }} ${MOCK_VERSION}" >> "$GITHUB_OUTPUT"
            echo "url=${REPO_URL}/releases/tag/${MOCK_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_mock=true" >> "$GITHUB_OUTPUT"
            # Manual runs honor the dry_run input.
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              echo "should_send=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_send=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Build Discord payload
        env:
          APP_NAME: ${{ steps.env.outputs.app_name }}
          VERSION: ${{ steps.env.outputs.version }}
          GAME_VERSION: ${{ steps.env.outputs.game_version }}
          TAG: ${{ steps.meta.outputs.tag }}
          TITLE: ${{ steps.meta.outputs.title }}
          RELEASE_URL: ${{ steps.meta.outputs.url }}
          NEXUS_URL: ${{ vars.NEXUS_MOD_URL || 'https://www.nexusmods.com/palworld/mods/3190' }}
          ICON_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/resources/assets/icons/app/icon.png
          IS_MOCK: ${{ steps.meta.outputs.is_mock }}
        run: |
          python3 - <<'PYEOF'
          import json, os

          app      = os.environ["APP_NAME"]
          version   = os.environ["VERSION"]
          game_ver  = os.environ["GAME_VERSION"]
          tag       = os.environ["TAG"]
          title     = os.environ["TITLE"]
          rel_url   = os.environ["RELEASE_URL"]
          nexus     = os.environ["NEXUS_URL"]
          icon      = os.environ["ICON_URL"]
          is_mock   = os.environ["IS_MOCK"] == "true"

          # Discord embed color: green (0x57F287) for real releases,
          # light blue (0x7AB8E8) for mock/test runs.
          color = 0x7AB8E8 if is_mock else 0x57F287

          links = (
              f"📥 [GitHub Release]({rel_url})  •  "
              f"📦 [Nexus Mods]({nexus})"
          )

          embed = {
              "title": f"🚀 {title} is live!",
              "url": rel_url,
              "description": (
                  f"**{app}** `{tag}` has dropped! 🎉\n\n"
                  + f"{links}\n\n"
                  + f"App Version `{version}` - Game Version `{game_ver}`"
              ),
              "color": color,
              "thumbnail": {"url": icon},
              "footer": {
                  "text": f"{app} • {'[MOCK TEST]' if is_mock else 'New release'}",
                  "icon_url": icon,
              },
          }

          payload = {
              "username": app,
              "avatar_url": icon,
              "content": "" if is_mock else "<@&1525904392086356028>",
              "embeds": [embed],
          }

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)

          print("=== Rendered payload (payload.json) ===")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PYEOF
      - name: Send to Discord (or skip in dry run)
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHOULD_SEND: ${{ steps.meta.outputs.should_send }}
        run: |
          if [ "$SHOULD_SEND" != "true" ]; then
            echo "::notice::Dry run — payload rendered but NOT sent. To send a manual test, re-run with dry_run=false."
            exit 0
          fi
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::WEBHOOK_URL secret is not set"
            exit 1
          fi
          # POST via curl: urllib's User-Agent is blocked by Cloudflare (HTTP 403 / error 1010).
          # curl uses an accepted signature and lets us surface Discord's response clearly.
          response=$(curl -sS -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data-binary @payload.json)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Discord responded: HTTP $http_code"
          echo "Body: ${body:-(empty)}"
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Notification sent successfully"
          else
            echo "::error::Discord returned HTTP $http_code: $body"
            exit 1
          fi
