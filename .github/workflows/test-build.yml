name: Test Build

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Target OS to build for"
        required: true
        default: linux
        type: choice
        options:
          - linux
          - macos
          - windows
      signing:
        description: "macOS code signing mode (ignored on other OSs)"
        required: false
        default: none
        type: choice
        options:
          - none
          - ad-hoc

concurrency:
  group: test-build-${{ github.event.inputs.os }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    if: ${{ github.event.inputs.os == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Bootstrap environment
        id: env
        uses: ./.github/actions/setup-build-env
      - name: Restore cached dist
        id: cache-dist
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-pst-dist-${{ steps.env.outputs.version }}-${{ hashFiles('build/**') }}
      - name: Install system deps
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file wget
      - name: Install dependencies
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build AppImage
        if: steps.cache-dist.outputs.cache-hit != 'true'
        # GitHub runners lack a usable FUSE mount namespace, so appimagetool
        # runs in extract-and-run mode inside linux_build.py.
        run: uv run python build/linux_build.py --appimage-extract-and-run
      - name: Verify build output
        run: |
          echo "=== Files in dist/ ==="
          if ! ls -la dist/; then
            echo "::error::dist/ directory not found — build produced no output"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: linux-test-build
          path: dist/${{ steps.env.outputs.app_name }}-*-linux.AppImage
          if-no-files-found: error

  build-mac:
    if: ${{ github.event.inputs.os == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Bootstrap environment
        id: env
        uses: ./.github/actions/setup-build-env
      - name: Restore cached dist
        id: cache-dist
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-pst-dist-${{ steps.env.outputs.version }}-${{ hashFiles('build/**') }}
      - name: Install dependencies
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka imageio
      - name: Build macOS DMG
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: |
          if [ "${{ github.event.inputs.signing }}" = "ad-hoc" ]; then
            uv run python build/macos_build.py --ad-hoc
          else
            uv run python build/macos_build.py
          fi
      - name: Verify build output
        run: |
          echo "=== Files in dist/ ==="
          if ! ls -la dist/; then
            echo "::error::dist/ directory not found — build produced no output"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: macos-test-build
          path: dist/${{ steps.env.outputs.app_name }}-*-macos.dmg
          if-no-files-found: error

