name: Test Changelog Translation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Draft release version (e.g. 2.1.4)'
        required: true
      game_version:
        description: 'Palworld game version (e.g. 1.0.2)'
        required: true
        default: '1.0.2'

permissions:
  contents: write

jobs:
  translate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: |
          uv venv
          uv pip install deep-translator
      - name: Run changelog translation
        run: uv run python scripts/scrs/translate_changelog.py
      - name: Render full release notes
        env:
          APP_NAME: PalworldSaveTools
          VERSION: ${{ github.event.inputs.version }}
          GAME_VERSION: ${{ github.event.inputs.game_version }}
          REPO_URL: https://github.com/${{ github.repository }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/v${{ github.event.inputs.version }}
          DISCORD_URL: https://discord.gg/sYcZwcT4cT
          NEXUS_URL: ${{ vars.NEXUS_MOD_URL || 'https://www.nexusmods.com/palworld/mods/3190' }}
        run: |
          envsubst < .github/templates/release_notes.md > /tmp/notes_partial.md
          sed -i '/__CHANGELOG_ENTRY__/{
            r CHANGELOG.multilang.md
            d
          }' /tmp/notes_partial.md
          mv /tmp/notes_partial.md release_notes.md
          echo "=== Rendered release notes ==="
          cat release_notes.md
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "v${VERSION}-preview" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION} — Full Release Preview" \
            --notes "$(cat release_notes.md)" \
            --draft
