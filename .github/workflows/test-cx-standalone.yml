name: Test cx_Freeze Standalone Build

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: test-cx-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cx:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Bootstrap environment
        id: env
        uses: ./.github/actions/setup-build-env

      - name: Add 7-Zip to PATH
        shell: pwsh
        run: |
          $paths = @(
            "C:\Program Files\7-Zip"
            "C:\Program Files (x86)\7-Zip"
          )
          foreach ($p in $paths) {
            if (Test-Path "$p\7z.exe") {
              echo "Found 7z at: $p\7z.exe"
              echo "$p" >> $env:GITHUB_PATH
              break
            }
          }

      - name: Build cx_Freeze standalone
        run: uv run python build/cx_freeze/build_cx.py

      - name: Verify build output
        shell: bash
        run: |
          echo "=== Root directory ==="
          ls -la *.7z 2>/dev/null || echo "No .7z files found at root"
          echo "=== PST_standalone/ ==="
          if [ -d PST_standalone ]; then
            ls -la PST_standalone/
          else
            echo "No PST_standalone directory found"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: cx-standalone-build-${{ steps.env.outputs.version }}
          path: PST_standalone_v*.7z
          if-no-files-found: warn

      - name: Extract changelog entry
        shell: bash
        run: |
          awk '/^#[0-9]/{if (found) exit; if ($0 == "#${{ steps.env.outputs.version }}") found=1; next} found' \
            changelogs.md > /tmp/changelog_entry.md 2>/dev/null || true
          if [ ! -s /tmp/changelog_entry.md ]; then
            echo "No changelog entry for v${{ steps.env.outputs.version }} yet." > /tmp/changelog_entry.md
          fi
          echo "=== Changelog entry ==="
          cat /tmp/changelog_entry.md

      - name: Render release notes from template
        shell: bash
        env:
          APP_NAME: ${{ steps.env.outputs.app_name }}
          VERSION: ${{ steps.env.outputs.version }}
          GAME_VERSION: ${{ steps.env.outputs.game_version }}
          REPO_URL: https://github.com/${{ github.repository }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/cx-test-${{ steps.env.outputs.version }}
          DISCORD_URL: https://discord.gg/sYcZwcT4cT
          NEXUS_URL: ${{ vars.NEXUS_MOD_URL || 'https://www.nexusmods.com/palworld/mods/3190' }}
        run: |
          envsubst < .github/templates/release_notes.md > /tmp/notes_partial.md
          sed -i '/__CHANGELOG_ENTRY__/{
            r /tmp/changelog_entry.md
            d
          }' /tmp/notes_partial.md
          mv /tmp/notes_partial.md release_notes.md
          echo "=== Rendered release notes ==="
          cat release_notes.md

      - name: Create draft testing release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: cx-test-${{ steps.env.outputs.version }}
          name: "cx_Freeze Test Build v${{ steps.env.outputs.version }}"
          body_path: release_notes.md
          draft: true
          prerelease: true
          files: PST_standalone_v*.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
